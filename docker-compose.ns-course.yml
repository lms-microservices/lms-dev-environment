name: lms-ns-course

networks:
  lms-network:
    driver: bridge

volumes:
  shared-db-data:

services:
  service-registry:
    build:
      context: ./service-registry
      dockerfile: Dockerfile
    container_name: ns-service-registry
    ports:
      - "8761:8761"
    networks:
      - lms-network

  shared-db:
    image: postgres:15-alpine
    container_name: ns-shared-db
    environment:
      POSTGRES_DB: lms_db
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - shared-db-data:/var/lib/postgresql/data
    networks:
      - lms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d lms_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: ns-auth-service
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://shared-db:5432/lms_db
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-supersecretkey-supersecretkey-2026}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-604800000}
    depends_on:
      service-registry:
        condition: service_started
      shared-db:
        condition: service_healthy
    networks:
      - lms-network

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: ns-user-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://shared-db:5432/lms_db
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
    depends_on:
      service-registry:
        condition: service_started
      shared-db:
        condition: service_healthy
    networks:
      - lms-network

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: ns-api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-supersecretkey-supersecretkey-2026}
    depends_on:
      service-registry:
        condition: service_started
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
    networks:
      - lms-network
